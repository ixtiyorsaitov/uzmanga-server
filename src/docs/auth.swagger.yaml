openapi: 3.0.0

info:
  title: UzManga Auth API
  version: 1.0.0
  description: Google OAuth 2.0 orqali autentifikatsiya

tags:
  - name: Auth
    description: Authentication endpoints

paths:
  /api/v1/auth/google:
    post:
      tags:
        - Auth
      summary: Google OAuth login boshlash
      description: |
        Google OAuth 2.0 login jarayonini boshlaydi.
        Backend Google authorization URL qaytaradi,
        frontend shu URL'ga redirect qiladi.
      responses:
        200:
          description: Google authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    example: https://accounts.google.com/o/oauth2/v2/auth?client_id=...

  /api/v1/auth:
    get:
      tags:
        - Auth
      summary: Google OAuth callback
      description: |
        Google tomonidan redirect qilinadigan callback endpoint.
        `code` query param orqali keladi.
        Backend code'ni tokenlarga almashtiradi,
        user ma'lumotlarini olib login qiladi.
      parameters:
        - name: code
          in: query
          required: true
          description: Google OAuth authorization code
          schema:
            type: string
            example: 4/0ASc3gC1abcXYZ
      responses:
        302:
          description: Login muvaffaqiyatli, frontendga redirect
          headers:
            Location:
              schema:
                type: string
                example: http://localhost:3000/
        400:
          description: Authorization code yuborilmagan
        500:
          description: Google authentication failed

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: 64f1c0c9b7a12e001234abcd
        email:
          type: string
          example: user@gmail.com
        name:
          type: string
          example: John Doe
        avatar:
          type: string
          example: https://lh3.googleusercontent.com/a/AAcHTte...
        provider:
          type: string
          example: google
        role:
          type: string
